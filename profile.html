<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lampião (@rei_do_cangaco) • Lampiagram</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header class="insta-header">
        <div class="profile-pic-container">
            <div class="profile-pic-img" style="background-image: url('assets/images/lampiao_perfil.jpg');"></div>
        </div>
        <div class="profile-info">
            <div class="username-row">
                <h1 class="username">rei_do_cangaco</h1>
                <i class="fas fa-check-circle verified-badge" style="color: #0095f6;"></i>
                <button class="follow-btn">Seguir</button>
            </div>
            <div class="stats-row">
                <div><strong>9</strong> publicações</div>
                <div><strong>1.2k</strong> seguidores</div>
                <div><strong>18</strong> seguindo</div>
            </div>
            <div class="bio">
                <p><strong>Virgulino Ferreira da Silva</strong></p>
                <p>Herói ou bandido? 🏜️👑</p>
                <p>Resistência e História no Sertão Brasileiro.</p>
                <p>📍 Poço Redondo, Sergipe.</p>
            </div>
        </div>
    </header>

    <section class="highlights-container">
        <div class="highlight-item" onclick="openPostModal('assets/images/origem.jpg', 'O início de tudo: a trajetória de Virgulino Ferreira até se tornar o temido Capitão Lampião.')">
            <div class="highlight-circle"><img src="assets/images/origem.jpg"></div>
            <span>A Origem</span>
        </div>
        <div class="highlight-item" onclick="openPostModal('assets/images/capitao.jpg', 'Autoridade, estratégia militar e o rígido código de conduta imposto aos cangaceiros..')">
            <div class="highlight-circle"><img src="assets/images/capitao.jpg"></div>
            <span>O Capitão</span>
        </div>
        <div class="highlight-item" onclick="openPostModal('assets/images/maria_bonita_destaque.jpg', 'A força feminina no sertão: a mulher que mudou a dinâmica social e o cotidiano do bando.')">
            <div class="highlight-circle"><img src="assets/images/maria_bonita_destaque.jpg"></div>
            <span>Maria Bonita</span>
        </div>
        <div class="highlight-item" onclick="openPostModal('assets/images/riqueza.jpeg', 'A ostentação nas indumentárias como símbolo de respeito, status e domínio territorial.')">
            <div class="highlight-circle"><img src="assets/images/riqueza.jpeg"></div>
            <span>Ouro e Poder</span>
        </div>
    </section>

    <div class="profile-tabs">
        <div class="tab active"><i class="fas fa-th"></i> PUBLICAÇÕES</div>
        <div class="tab"><i class="fas fa-video"></i> REELS</div>
    </div>

    <main class="posts-grid">
        <div class="post-item" onclick="openPostModal('https://res.cloudinary.com/dl6brxlht/video/upload/v1774207463/entrevista_vncjdd.mp4', 'ENTREVISTA HISTÓRICA: O encontro com Octacílio Macêdo em Juazeiro. Lampião tenta se vender como defensor da ordem e das classes conservadoras, mostrando sua habilidade política e retórica para se manter relevante no cenário nacional.', 'video')">
            <video src="https://res.cloudinary.com/dl6brxlht/video/upload/v1774207463/entrevista_vncjdd.mp4#t=0.001" class="post-image" muted preload="metadata"></video>
            <i class="fas fa-play media-icon"></i>
        </div>

        <div class="post-item" onclick="openPostModal('https://res.cloudinary.com/dl6brxlht/video/upload/v1774207468/a-face-oculta-de-lampiao_kqqwja.mp4', 'A FACE OCULTA: A desconstrução do mito. Os números reais da barbárie: assassinatos, saques e as alianças políticas com coronéis que sustentavam o ciclo de violência e poder no sertão profundo..', 'video')">
            <video src="https://res.cloudinary.com/dl6brxlht/video/upload/v1774207468/a-face-oculta-de-lampiao_kqqwja.mp4#t=0.001" class="post-image" muted preload="metadata"></video>
            <i class="fas fa-exclamation-triangle media-icon" style="color: yellow;"></i>
        </div>

        <div class="post-item" onclick="openPostModal('assets/images/bornal_misticismo_zoom.png', 'O ESCUDO QUE FALHOU: Detalhe do bornal do Angicos. O couro trabalhado e o Signo-de-Salomão (a estrela mística) expõem a obsessão de Lampião pela proteção espiritual e o apuro estético único do bando..')">
            <img src="assets/images/bornal_misticismo_zoom.png" class="post-image">
        </div>
        <div class="post-item" onclick="openPostModal('assets/images/misticismo_cangaco.jpg', 'MISTICISMO: Símbolos de proteção e fé. O cangaço era permeado por crenças em "corpo fechado", onde a religiosidade popular e o misticismo serviam como armadura psicológica contra os perigos da caatinga..')">
            <img src="assets/images/misticismo_cangaco.jpg" class="post-image">
        </div>
    </main>

    <div class="modal" id="postModal">
        <span class="close-modal" id="closePostModal">&times;</span>
        <div class="modal-content">
            <div class="detail-image-container" id="modalImageContainer"></div>
            <div class="detail-info-container">
                <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 15px;">
                    <div class="profile-pic-img" style="width: 30px; height: 30px; background-image: url('assets/images/lampiao_perfil.jpg');"></div>
                    <strong>rei_do_cangaco</strong>
                </div>
                <p id="modalDescription"></p>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
